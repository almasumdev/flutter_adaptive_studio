name: Publish

# Publishes to pub.dev when a version tag (v1.2.3) is pushed. Uses pub.dev's
# OIDC automated-publishing flow, so no token/secret is stored in the repo —
# configure the package's "Automated publishing" on pub.dev to trust this
# workflow first. Tag a release that matches pubspec.yaml's version:
#   git tag v0.17.0 && git push origin v0.17.0
on:
  push:
    tags: ['v*']

jobs:
  publish:
    name: Publish to pub.dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # pub.dev OIDC automated publishing
    steps:
      - uses: actions/checkout@v5

      # pub resolves example/ too, which needs the Flutter SDK — a Dart-only
      # setup fails here. flutter ships dart as well.
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: dart-lang/setup-dart@v1 # configures pub.dev OIDC credentials

      - run: flutter pub get
      - run: flutter pub publish --force
