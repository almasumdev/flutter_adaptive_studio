name: CI

on:
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Format, analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      # `reference/` (vendored study code), `example_2/` and `tool/` are excluded
      # from analysis (analysis_options.yaml) and the package (.pubignore), so the
      # format check is scoped to our published sources.
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed bin lib test example/lib

      - name: Analyze code
        run: dart analyze

      - name: Run tests
        run: dart test

      - name: Verify pub publish dry-run
        run: flutter pub publish --dry-run

      - name: Analyze example app
        working-directory: example
        run: |
          flutter pub get
          flutter analyze
