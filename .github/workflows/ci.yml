name: CI & Release

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Format, analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Package — install
        run: flutter pub get

      # Scoped to our own sources — the repo vendors third-party code under
      # reference/ (and a scratch example_2/) that we don't reformat.
      - name: Package — format
        run: dart format --output=none --set-exit-if-changed bin lib test example/lib

      - name: Package — analyze
        run: flutter analyze

      - name: Package — test
        run: flutter test

      - name: Example — install & analyze
        working-directory: example
        run: |
          flutter pub get
          flutter analyze

  # Pana score gate — temporarily disabled (the local dartdoc bug makes the
  # score unreliable to gate on; re-enable once confirmed on pub.dev).
  # pana:
  #   name: Pana score gate
  #   needs: checks
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v5
  #
  #     - uses: subosito/flutter-action@v2
