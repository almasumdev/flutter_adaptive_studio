name: flutter_adaptive_studio
description: >-
  Vector-native, theme-aware, mask-correct launcher icons and animated splash
  screens for Flutter — done the way native tooling does it, per platform.
version: 0.20.0
repository: https://github.com/almasumdev/flutter_adaptive_studio
issue_tracker: https://github.com/almasumdev/flutter_adaptive_studio/issues

topics:
  - icons
  - launcher-icons
  - splash-screen
  - adaptive-icons
  - cli

# A pure-Dart command-line generator — install it with `dart pub global activate
# flutter_adaptive_studio` and run `fas generate`. It writes native icon/splash
# files into your android/ and ios/ folders, plus a self-contained
# `lib/fas_splash.g.dart` for the in-app splash that imports only package:flutter.
# Your app therefore depends on NOTHING from this package, so its build-time
# dependencies (image, xml, …) can never conflict with your app's.

environment:
  sdk: ^3.6.0

executables:
  flutter_adaptive_studio: flutter_adaptive_studio
  fas: flutter_adaptive_studio

dependencies:
  args: ^2.6.0
  image: ^4.9.1
  meta: ^1.16.0
  path: ^1.9.0
  xml: ^7.0.1
  yaml: ^3.1.2

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
