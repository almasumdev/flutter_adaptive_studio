name: flutter_adaptive_studio
description: >-
  Generate adaptive launcher icons, app icons and animated splash screens for
  Flutter on Android and iOS from one SVG. Themed and mask-correct, per flavor.
version: 0.28.8
repository: https://github.com/almasumdev/flutter_adaptive_studio
issue_tracker: https://github.com/almasumdev/flutter_adaptive_studio/issues

topics:
  - icons
  - launcher-icons
  - splash-screen
  - adaptive-icons
  - app-icon

screenshots:
  - description: The flutter_adaptive_studio logo.
    path: images/logo.webp

environment:
  sdk: ^3.6.0

executables:
  flutter_adaptive_studio: flutter_adaptive_studio
  fas: flutter_adaptive_studio

dependencies:
  args: ^2.6.0
  image: ^4.9.1
  meta: ^1.16.0
  path: ^1.9.0
  xml: ^7.0.1
  yaml: ^3.1.2

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
