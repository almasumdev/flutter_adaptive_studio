# Example flutter_adaptive_studio config.
#
# Drop this (and the assets/ folder) into a Flutter project, then run:
#   dart run flutter_adaptive_studio generate
#   dart run flutter_adaptive_studio generate --flavor dev
# (or, after `dart pub global activate flutter_adaptive_studio`, just `fas generate`)
#
# It produces Android adaptive icons + a native splash with a Flutter fallback,
# and iOS app icons + a launch screen, light & dark.
# See `dart run flutter_adaptive_studio init` for a fully-commented reference of
# every option.

flutter_adaptive_studio:
  source: assets/app_icon.webp

  android:
    icon:
      adaptive:
        foreground: assets/app_icon.webp            # the app icon mark (lossless WebP, alpha)
        background: "#141a3a"                        # navy the mark sits on
        safe_zone: fit                               # centre the mark in the safe zone
      round: true
      play_store: true

    splash:
      background: "#141a3a"                          # navy, matching the app icon
      background_dark: "#0b0f1c"
      icon_background: "#141a3a"
      icon_background_dark: "#0b0f1c"
      image: assets/app_icon.webp                   # static centre logo (native + in-app)
      duration: 1200                                # in-app splash hold (ms)
      flutter_splash_all_versions: true             # show AdaptiveSplash on every
                                                    #   version so the demo is visible
                                                    #   on a modern emulator too

  ios:
    icon:
      image: assets/app_icon.webp                   # same finished icon on iOS
      background: "#141a3a"
    splash:
      background: "#141a3a"
      background_dark: "#0b0f1c"
      image: assets/app_icon.webp

  # Per-flavor overrides deep-merge over the base, so set only what differs.
  flavors:
    dev:
      android:
        icon:
          adaptive:
            background: "#00C853"
        splash:
          background: "#00C853"
