<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 288 288" width="288" height="288">
  <!-- Monochrome silhouette for Android 13 themed icons + iOS tinted.
       The system tints the whole mark to one colour, so legibility comes from
       SHAPE (transparent gaps), not colour: an outlined card, row bars, and a
       check ring/tick — all in a single ink, separated by empty space. -->
  <g fill="#1f5560" stroke="#1f5560" stroke-linecap="round" stroke-linejoin="round">
    <rect x="92" y="86" width="116" height="150" rx="20" fill="none" stroke-width="10"/>
    <rect x="108" y="116" width="84" height="12" rx="6" stroke="none"/>
    <rect x="108" y="140" width="84" height="12" rx="6" stroke="none"/>
    <rect x="108" y="164" width="56" height="12" rx="6" stroke="none"/>
    <circle cx="208" cy="206" r="30" fill="none" stroke-width="9"/>
    <path d="M196 206 L205 216 L222 196" fill="none" stroke-width="9"/>
  </g>
</svg>
