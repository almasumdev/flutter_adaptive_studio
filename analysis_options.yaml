include: package:lints/recommended.yaml

analyzer:
  exclude:
    - reference/** # vendored incumbent packages, study-only
    - example/** # generated/sample project
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    todo: ignore

linter:
  rules:
    - prefer_single_quotes
    - directives_ordering
    - unawaited_futures
