# flutter_adaptive_studio — example_2 showcase config (real assets, ready to run)
#
# Exercises SVG art (icon, splash logo, branding, iOS) AND AnimatedVectorDrawables
# (the native Android 12 splash animation), light + dark throughout.
#   Base:   dart run flutter_adaptive_studio generate
#   Flavor: dart run flutter_adaptive_studio generate --flavor dev
#           (building a flavor also needs its Gradle/Xcode flavor set up)

flutter_adaptive_studio:
  source: assets/listkin_logo.svg            # global fallback art

  android:
    icon:
      adaptive:
        foreground: assets/listkin_logo.svg
        background: "#fbfaf5"                 # cream, matches the logo's rows
        monochrome: assets/listkin_logo_mono.svg   # Android 13 themed icon
        safe_zone: fit
      round: true                             # ic_launcher_round
      play_store: true                        # 512² store PNG
      image: assets/icon.png                  # finished icon for legacy + store

    splash:
      background: "#fbfaf5"
      background_dark: "#0E1A1C"
      icon_background: "#fbfaf5"              # API 31+ icon circle
      icon_background_dark: "#0E1A1C"
      image: assets/listkin_logo.svg          # static logo → Flutter fallback + pre-31
      animated_icon: assets/avd_listkin_light.xml      # API 31+ native animation
      animated_icon_dark: assets/avd_listkin_dark.xml
      duration: 1000
      branding: assets/wordmark.svg           # 200×80dp bottom slot
      branding_dark: assets/wordmark_dark.svg
      branding_mode: bottom

  ios:
    icon:
      image: assets/listkin_logo.svg
      background: "#fbfaf5"
      dark: assets/listkin_logo_dark.svg      # iOS 18 dark appearance
      background_dark: "#0E1A1C"
      tinted: assets/listkin_logo_mono.svg    # iOS 18 tinted appearance
    splash:
      background: "#fbfaf5"
      background_dark: "#0E1A1C"
      image: assets/listkin_logo.svg
      image_dark: assets/listkin_logo_dark.svg
      logo_size: 180

  # Deep-merged over the base — set only what differs; the rest is inherited.
  flavors:
    dev:
      android:
        icon:
          adaptive:
            background: "#00C853"             # green dev launcher background
        splash:
          background: "#00C853"
          branding_mode: bottom_right
      ios:
        icon:
          background: "#00C853"
    prod:
      android:
        icon:
          adaptive:
            background: "#1f5560"             # deep teal for prod
        splash:
          background: "#1f5560"
